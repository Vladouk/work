version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jobhunter_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobhunter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobhunter"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jobhunter_net

  # ── Database migration runner ─────────────────────────────────────────────────
  migrate:
    build:
      context: .
      target: builder
    container_name: jobhunter_migrate
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/jobhunter
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jobhunter_net
    restart: "no"

  # ── Telegram Bot ──────────────────────────────────────────────────────────────
  bot:
    build:
      context: .
      target: production
    container_name: jobhunter_bot
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/jobhunter
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4-turbo-preview}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-*/30 * * * *}
      PARSER_TIMEOUT: ${PARSER_TIMEOUT:-30000}
      PARSER_MAX_RETRIES: ${PARSER_MAX_RETRIES:-3}
    volumes:
      - bot_logs:/app/logs
      - bot_uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - jobhunter_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local
  bot_logs:
    driver: local
  bot_uploads:
    driver: local

networks:
  jobhunter_net:
    driver: bridge
